<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valtonom - Social Network</title>
    <link rel="stylesheet" href="confing_theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="componenets/navbar/navbar.css">
    <link rel="stylesheet" href="pages/home/home.css">
    <link rel="stylesheet" href="pages/login/login.css">
    <style>

    </style>
</head>

<body>
    <div class="page-center">
        <div id="login-container" class="card">
            <img id="form-image" src="assets/images/" alt="login image">

            <form>
                <input type="text" placeholder="Username">

                <div class="password-box">
                    <input type="password" placeholder="Password" id="password">
                    <i class="fa-solid fa-eye" id="togglePassword"></i>
                </div>

                <button type="submit" class="btn primary">Login</button>

                <p class="register-text">
                    Not registered?
                    <a href="/register.html">Create an account</a>
                </p>
            </form>
        </div>
    </div>
    <script src="pages/login/login.js"></script>
</body>

</html>
