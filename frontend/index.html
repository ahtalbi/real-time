<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valtonom - Social Network</title>
    <link rel="stylesheet" href="confing_theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap');
    </style>
    <link rel="stylesheet" href="componenets/navbar/navbar.css">
</head>

<body>
    <!-- Navbar -->
    <nav>
        <div id="logo">
            <img src="./assets/images/logo.png" alt="">
            <h1>Valtonom</h1>
        </div>

        <!-- <div id="actions">
            <i class="fa-solid fa-bell"></i>
            <img id="profile" src="https://avatars.githubusercontent.com/u/128240067?v=4" alt="Profile">
        </div> -->

        <div id="burger-menu" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div id="auth">
            <button>Login</button>
            <button>Register</button>
        </div>

    </nav>

    <script>
        function toggleMenu() {
            document.getElementById('auth').classList.toggle('active');
        }

        document.addEventListener('click', (e) => {
            const burger = document.getElementById('burger-menu');
            const auth = document.getElementById('auth');
            if (burger && !burger.contains(e.target) && !auth?.contains(e.target)) {
                auth?.classList.remove('active');
            }
        });
    </script>
    <script src="navbar/navbar.js"></script>
</body>

</html>
