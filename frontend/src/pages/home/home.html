<!-- Navbar -->
<nav>
    <div id="logo">
        <img src="./assets/images/logo.png" width="50px" alt="">
        <h1>Valtonom</h1>
    </div>

    <div id="actions">
        <i class="fa-solid fa-bell"></i>
        <div class="profile-menu" id="profileMenu">
            <img id="profile" src="" alt="Profile">
            <div class="profile-dropdown" id="profileDropdown">
                <button class="dropdown-item" id="logoutBtn" type="button">Logout</button>
            </div>
        </div>
    </div>
</nav>

<!-- Hero Section -->
<div id="hero">
    <!-- Left Sidebar -->
    <div id="links">
        <div class="card profile">
            <img id="avatar" class="avatar" src="" alt="Avatar utilisateur">

            <div class="meta">
                <h2 id="username"></h2>
                <p class="status">Self-learner • Level: Intermediate</p>
            </div>

            <div class="follow-stats">
                <div class="stat">
                    <span class="number">128</span>
                    <span class="label">Following</span>
                </div>

                <div class="stat">
                    <span class="number">342</span>
                    <span class="label">Followers</span>
                </div>
            </div>
        </div>

        <div class="card menu">
            <h3 class="title">My Ecosystem</h3>
            <a class="item" href="#">Feed</a>
            <a class="item" href="#">Paths</a>
            <a class="item" href="#">Library</a>
            <a class="item" href="#">Projects</a>
            <a class="item" href="#">Challenges</a>
            <a class="item" href="#">Settings</a>
        </div>
    </div>

    <main id="posts">
        <div class="composer card">
            <form id="postCreate">
                <div class="row">
                    <div class="avatar sm" aria-hidden="true"></div>
                    <input class="input" name="content" type="text"
                        placeholder="What you want to (ask | share) today?" />
                </div>

                <div class="row-between categories-row">
                <div class="row categories-list">
                  <label><input type="checkbox" name="categories" value="Science"> Science</label>
                  <label><input type="checkbox" name="categories" value="Technology"> Technology</label>
                  <label><input type="checkbox" name="categories" value="Mathematics"> Mathematics</label>
                  <label><input type="checkbox" name="categories" value="Languages"> Languages</label>
                  <label><input type="checkbox" name="categories" value="Humanities"> Humanities</label>
                  <label><input type="checkbox" name="categories" value="Personal Development"> Personal Development</label>
                </div>
                
                <button class="btn primary" type="submit">Post</button>
                <div>
                    
                </form>
            </div>
            <button class="btn" type="button">Challenge</button>
    </main>

    <!-- Right Sidebar -->
    <div id="friends">
        <div class="card suggestions">
            <div class="Border-Bottom">
                <h2 class="title">Friends</h2>
                <button class="btn" id="messagesBtn" type="button">Messages</button>
            </div>
            <ul id="FreindsList" class="list"></ul>
        </div>

        <div class="card communities">
            <h3 class="title">Communities</h3>
            <ul class="list">
                <li class="row-between">
                    <span>Go Learners</span>
                    <button class="btn" type="button">Join</button>
                </li>
                <li class="row-between">
                    <span>CSS & UI</span>
                    <button class="btn" type="button">Join</button>
                </li>
                <li class="row-between">
                    <span>42 Challenges</span>
                    <button class="btn" type="button">Join</button>
                </li>
            </ul>
        </div>

        <div class="card help">
            <h3 class="title">Help</h3>
            <a class="item" href="#">Guide</a>
            <a class="item" href="#">Rules</a>
            <a class="item" href="#">Support</a>
        </div>
    </div>
    <button id="messagesFab" type="button" aria-label="Messages">💬</button>
</div>
<div id="footer-observer"></div>
