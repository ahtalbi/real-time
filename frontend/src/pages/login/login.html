<div class="page-center">
    <div id="auth-container" class="card">
        <img id="form-image" src="assets/images/cat1.jpg" alt="login image">

        <form id="login-container">
            <input type="text" name="nickname" placeholder="Nickname Or Email">

            <div class="password-box">
                <input type="password" name="password" placeholder="Password Or Email" id="password">
                <i class="fa-solid fa-eye" id="togglePassword"></i>
            </div>

            <button type="submit" class="btn primary">Login</button>

            <p class="register-text">
                Not registered?
                <a href="/register">Create an account</a>
            </p>
        </form>
    </div>
</div>
