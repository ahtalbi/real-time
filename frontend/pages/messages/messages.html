<!-- Navbar -->
<nav>
    <div id="logo">
        <img src="./assets/images/logo.png" width="50px" alt="">
        <h1>Valtonom</h1>
    </div>

    <div id="actions">
        <i class="fa-solid fa-bell"></i>
        <div class="profile-menu" id="profileMenu">
            <img id="profile" src="https://avatars.githubusercontent.com/u/128240067?v=4" alt="Profile">
            <div class="profile-dropdown" id="profileDropdown">
                <button class="dropdown-item" id="logoutBtn" type="button">Logout</button>
            </div>
        </div>
    </div>
</nav>

<div class="messages-page">
    <aside class="threads card">
        <h3 class="title">Messages</h3>
        <ul class="list" data-friends-list data-friends-actions="message"></ul>
        <button class="btn seemore ghost" type="button" data-see-more-users>See More...</button>
    </aside>

    <section class="conversation card">
        <header class="conversation-header">
            <div class="row">
                <div class="avatar sm" aria-hidden="true"></div>
                <div class="meta">
                    <span class="name" data-conversation-name>Select a user</span>
                    <span class="status" data-conversation-status>Ready when you are</span>
                </div>
            </div>
        </header>

        <div class="conversation-body" data-conversation-body></div>

        <form class="composer" data-composer>
            <input class="input" type="text" placeholder="Ecrire un message..." data-message-input disabled />
            <button class="btn primary" type="submit" data-message-send disabled>Envoyer</button>
        </form>
    </section>
</div>
