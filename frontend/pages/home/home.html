<!-- Navbar -->
<nav>
    <div id="logo">
        <img src="./assets/images/logo.png" width="50px" alt="">
        <h1>Valtonom</h1>
    </div>

    <div id="actions">
        <i class="fa-solid fa-bell"></i>
        <img id="profile" src="https://avatars.githubusercontent.com/u/128240067?v=4" alt="Profile">
    </div>
</nav>

<!-- Hero Section -->
<div id="hero">
    <!-- Left Sidebar -->
    <aside id="links">
        <div class="card profile">
            <div class="avatar" aria-hidden="true"></div>

            <div class="meta">
                <h2 class="name">Your Name</h2>
                <p class="status">Self-learner • Level: Intermediate</p>
            </div>

            <div class="follow-stats">
                <div class="stat">
                    <span class="number">128</span>
                    <span class="label">Following</span>
                </div>

                <div class="stat">
                    <span class="number">342</span>
                    <span class="label">Followers</span>
                </div>
            </div>
        </div>

        <div class="card menu">
            <h3 class="title">My Ecosystem</h3>
            <a class="item" href="#">Feed</a>
            <a class="item" href="#">Paths</a>
            <a class="item" href="#">Library</a>
            <a class="item" href="#">Projects</a>
            <a class="item" href="#">Challenges</a>
            <a class="item" href="#">Settings</a>
        </div>
    </aside>

    <main id="posts">
        <div class="composer card">
            <form id="postCreate">
                <div class="row">
                    <div class="avatar sm" aria-hidden="true"></div>
                    <input class="input" name="content" type="text"
                        placeholder="What you want to (ask | share) today?" />
                </div>

                <div class="row-between" style="margin-top:12px;">
                    <div class="row" style="gap:10px;">
                        <select name="category" class="input" style="max-width:220px;" required>
                            <option value="" disabled selected>Select category</option>
                            <option value="Science">Science</option>
                            <option value="Technology">Technology</option>
                            <option value="Mathematics">Mathematics</option>
                            <option value="Languages">Languages</option>
                            <option value="Humanities">Humanities</option>
                            <option value="Personal Development">Personal Development</option>
                        </select>

                        <button class="btn" id="pic" type="button">Photo</button>
                        <input class="pic" type="file" name="image" accept="image/*" style="display:none;" id="postImage">

                        <button class="btn" type="button">Link</button>
                        <button class="btn" type="button">Challenge</button>
                    </div>

                    <button class="btn primary" type="submit" >Post</button>
                </div>
            </form>
        </div>
    </main>

    <!-- Right Sidebar -->
    <aside id="friends">
        <div class="card suggestions">
            <h3 class="title">Friends</h3>
            <ul class="list">
                <li class="row-between">
                    <span><span class="dot ok"></span> Marc</span>
                    <button class="btn" type="button">Message</button>
                </li>
                <li class="row-between">
                    <span><span class="dot ok"></span> Elana</span>
                    <button class="btn" type="button">Message</button>
                </li>
                <li class="row-between">
                    <span><span class="dot"></span> Leem</span>
                    <button class="btn" type="button">Message</button>
                </li>
            </ul>
        </div>

        <div class="card communities">
            <h3 class="title">Communities</h3>
            <ul class="list">
                <li class="row-between">
                    <span>Go Learners</span>
                    <button class="btn" type="button">Join</button>
                </li>
                <li class="row-between">
                    <span>CSS & UI</span>
                    <button class="btn" type="button">Join</button>
                </li>
                <li class="row-between">
                    <span>42 Challenges</span>
                    <button class="btn" type="button">Join</button>
                </li>
            </ul>
        </div>

        <div class="card help">
            <h3 class="title">Help</h3>
            <a class="item" href="#">Guide</a>
            <a class="item" href="#">Rules</a>
            <a class="item" href="#">Support</a>
        </div>
    </aside>
</div>
<div id="footer-observer"></div>
